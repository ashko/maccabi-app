# Netlify build config for the RideCoach PWA (lives in web/).
[build]
  base = "web"
  command = "npm run build"
  publish = "dist"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# SPA fallback so any client path serves the app shell (API routes excluded).
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = false
